{% extends 'base.html' %}

{% block title %}Login | HackathonHub{% endblock %}

{% block content %}

<div class="auth-card">

    <h2 style="margin-bottom: 5px;">🔐 Login</h2>
    <p style="margin-bottom: 25px;">Welcome back! Please login to continue.</p>

    <form method="POST">

        <label>Email Address</label>
        <input
            type="email"
            name="email"
            placeholder="Enter your email"
            required
        >

        <label>Password</label>
        <input
            type="password"
            name="password"
            placeholder="Enter your password"
            required
        >

        <button type="submit" class="btn-primary full-width" style="margin-top: 10px;">
            <i class="fa-solid fa-right-to-bracket"></i>
            Login
        </button>

    </form>

    <p class="text-center" style="margin-top: 20px;">
        Don't have an account? <a href="/register">Register here</a>
    </p>

</div>

{% endblock %}
